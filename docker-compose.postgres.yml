services:
  architectural-knowledge-db:
    environment:
      AKDB_DB_URL: postgresql://akdb:akdb@db:5432/akdb
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: akdb
      POSTGRES_PASSWORD: akdb
      POSTGRES_DB: akdb
    volumes:
      - akdb-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akdb -d akdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  akdb-pg:
